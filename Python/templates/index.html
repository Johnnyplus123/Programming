<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTN USSD Simulator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 600px;
            background-color: #111;
            border: 2px solid #00ff00;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 0 20px #00ff00;
        }
        .form-control {
            background-color: #000;
            border: 1px solid #00ff00;
            color: #00ff00;
        }
        .form-control:focus {
            background-color: #000;
            border-color: #00ff00;
            color: #00ff00;
            box-shadow: 0 0 0 0.2rem rgba(0, 255, 0, 0.25);
        }
        .btn-primary {
            background-color: #00ff00;
            border-color: #00ff00;
            color: #000;
            font-weight: bold;
        }
        .btn-primary:hover {
            background-color: #00cc00;
            border-color: #00cc00;
        }
        .alert {
            background-color: #330000;
            border-color: #ff0000;
            color: #ff6666;
        }
        h1 {
            text-align: center;
            text-shadow: 0 0 10px #00ff00;
            margin-bottom: 30px;
        }
        .terminal-cursor {
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>MTN USSD Simulator <span class="terminal-cursor">_</span></h1>
        <form method="POST">
            <div class="mb-3">
                <label for="ussd_code" class="form-label">Enter USSD Code:</label>
                <input type="text" class="form-control" id="ussd_code" name="ussd_code" placeholder="*123#" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Connect</button>
        </form>
        {% if error %}
        <div class="alert alert-danger mt-3">
            {{ error }}
        </div>
        {% endif %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
