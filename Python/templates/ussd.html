<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - MTN USSD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="ussd.py">
    <style>
        body {
            background-color: #000;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            padding: 20px;
        }
        .menu-container {
            max-width: 800px;
            margin: 0 auto;
            background-color: #111;
            border: 2px solid #00ff00;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 0 20px #00ff00;
        }
        .menu-option {
            background-color: #222;
            border: 1px solid #00ff00;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 10px;
            transition: all 0.3s;
        }
        .menu-option:hover {
            background-color: #333;
            box-shadow: 0 0 10px #00ff00;
        }
        .option-number {
            color: #ffff00;
            font-weight: bold;
            margin-right: 10px;
        }
        .btn-back {
            background-color: #ff6600;
            border-color: #ff6600;
            color: #000;
            margin-right: 10px;
        }
        .btn-back:hover {
            background-color: #cc5500;
            border-color: #cc5500;
        }
        .btn-option {
            background-color: #00ff00;
            border-color: #00ff00;
            color: #000;
            margin: 5px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-weight: bold;
        }
        .btn-option:hover {
            background-color: #00cc00;
            border-color: #00cc00;
        }
        .alert {
            background-color: #003300;
            border-color: #00ff00;
            color: #00ff00;
        }
        .alert-danger {
            background-color: #330000;
            border-color: #ff0000;
            color: #ff6666;
        }
        h2 {
            text-align: center;
            text-shadow: 0 0 10px #00ff00;
            margin-bottom: 30px;
        }
        .terminal-cursor {
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        .matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.1;
        }
    </style>
</head>
<body>
    <div class="matrix-bg">
        <!-- Matrix-like background effect -->
        <script>
            const canvas = document.createElement('canvas');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            document.body.appendChild(canvas);
            const ctx = canvas.getContext('2d');
            const chars = '01';
            const fontSize = 14;
            const columns = canvas.width / fontSize;
            const drops = [];
            for (let x = 0; x < columns; x++) {
                drops[x] = 1;
            }
            function draw() {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.04)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#00ff00';
                ctx.font = fontSize + 'px monospace';
                for (let i = 0; i < drops.length; i++) {
                    const text = chars.charAt(Math.floor(Math.random() * chars.length));
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                        drops[i] = 0;
                    }
                    drops[i]++;
                }
            }
            setInterval(draw, 33);
        </script>
    </div>
    <div class="menu-container">
        <h2>{{ title }} <span class="terminal-cursor">_</span></h2>
        
        {% if message %}
        <div class="alert alert-success">
            {{ message }}
        </div>
        {% endif %}
        
        {% if error %}
        <div class="alert alert-danger">
            {{ error }}
        </div>
        {% endif %}
        
        <form method="POST" class="mb-4">
            <div class="d-flex justify-content-center flex-wrap">
                {% for key, value in menu.items() %}
                <button type="submit" name="choice" value="{{ key }}" class="btn btn-option">{{ key }}</button>
                {% endfor %}
                <button type="submit" name="choice" value="0" class="btn btn-back">Back</button>
            </div>
        </form>
        
        <div class="row">
            {% for key, value in menu.items() %}
            <div class="col-md-6">
                <div class="menu-option">
                    <span class="option-number">{{ key }}.</span> {{ value }}
                </div>
            </div>
            {% endfor %}
        </div>
        
        <div class="text-center mt-4">
            <small class="text-muted">Press 0 to go back • MTN USSD Service</small>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
