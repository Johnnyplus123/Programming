<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="flex">
        <div class="checkout">
            <h1>Checkout</h1>
            <h2>Contact Information</h2>

            <label for="email">Email
                <input type="email" placeholder="your@gmail.com">
            </label>

            <label for="nunber">Phone Number
                <input type="tel" placeholder="+234 800 000 0000">
            </label>

            <h2>Shipping Address</h2>
            <label for="Country">Country
                <input type="text" placeholder="Select Country">
            </label>

            <div class="flex1">
                <label for="First Name">First Name
                    <input type="text" placeholder="John">
                </label>

                <label for="Last Name">Last Name
                    <input type="text" placeholder="Joe">
                </label>
            </div>

            <label for="Address">Address
                <input type="text" placeholder="Street address">
            </label>
            <div class="flex2">
                <label for="City">City
                    <input type="text" placeholder="Lagos">
                </label>

                <label for="State/Province">State/Province
                    <input type="text" placeholder="Lagos">
                </label>
            </div>

            <label for="Postal Code">Postal Code
                <input type="text" placeholder="100001">
            </label>

            <h2>Payment Method</h2>
            <label for="Card Number">Card Number
                <input type="tel" placeholder="1325 1326 6974 0978">
            </label>

            <div class="flex3">
                <label for="Expiry Date">Expiry Date
                    <input type="date" placeholder="MM/YY">
                </label>

                <label for="CVV">CVV
                    <input type="tel" placeholder="123">
                </label>
            </div>

            <label for="Order Notes">Order Notes (Optional)
                <input type="text" placeholder="Special instruction for delivery">
            </label>
        </div>


        <div class="order">
            <h1>Your Order</h1>
            <div>
                <div class="flex4">
                    <img src="turtle3.jpg" alt="product">
                </div>
                <div class="precious">
                    <h2>Nike Air Max 270</h3>
                        <h3>$129.99</h3><br />
                        <p>Quantity:1</p>
                </div>

                <div class="flex5">
                    <img src="Screenshot_2025-12-01_04-44-08.png" alt="product">
                    <div class="precious1">
                        <h2>Adidas Ultraboot</h2>
                        <h3>$159.99</h3>
                        <p>Quantity:2</p>
                    </div>
                </div>

                <div class="flex6">
                    <h4>Subtotal</h4>
                    <div>
                        <h4>$299.99</h4>
                    </div>
                </div>

                <div class="flex7">
                    <h4>Shipping</h4>
                    <div>
                        <h4>$15.99</h4>
                    </div>
                </div>

                <div class="flex8">
                    <h4>Tax (7.5%)</h4>
                    <div>
                        <h4>$21.75</h4>
                    </div>
                </div>
                <h3>Total $326.73</h3>
                <button class="btn">Place Order</button>
            </div>
        </div>
</body>

</html>
