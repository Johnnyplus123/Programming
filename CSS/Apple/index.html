 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Apple Style Landing Page</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="logo"></div>

  <ul class="nav-links">
    <li>Mac</li>
    <li>iPhone</li>
    <li>iPad</li>
    <li>Watch</li>
    <li>Support</li>
  </ul>

  <div class="nav-icons">
    🔍 🛒
  </div>
</header>

<!-- HERO SECTION -->
<section class="hero">
  <h1>iPhone 15 Pro</h1>
  <p>Titanium. So strong. So light. So Pro.</p>
  <div class="buttons">
    <button class="btn">Learn more</button>
    <button class="btn dark">Buy</button>
  </div>
</section>

<!-- PRODUCT SECTION -->
<section class="product">
  <h2>MacBook Pro</h2>
  <p>Supercharged for pros.</p>
</section>

<section class="product dark-section">
  <h2>Apple Watch</h2>
  <p>Smarter. Brighter. More powerful.</p>
</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 Apple-style clone project (for learning only)</p>
</footer>

</body>
</html>
